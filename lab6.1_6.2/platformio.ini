; build_flags = -DLAB_5_2 -DSERIAL_FREERTOS_YIELD -Wl,-u,vfprintf -lprintf_flt -Wl,-u,vfscanf -lscanf_flt -lm
; lib_deps =
;   feilipu/FreeRTOS
;   marcoschwartz/LiquidCrystal_I2C
; build_src_filter =
;   +<*>
;   -<lab_1_1/> -<lab_1_2/>
;   -<lab_2_1/> -<lab_2_2/>
;   -<lab_3_1/> -<lab_3_2/>
;   -<lab_4_1/> -<lab_4_2/>
;   -<lab_5_1/>
;   -<srv_os_sequential/>
;   -<dd_keypad/> -<dd_sound/> -<dd_dht/> -<dd_actuator/>
;   -<srv_lcd_keypad_stdio/>

