[env:mega_lab5_1]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 9600
monitor_eol = LF
monitor_echo = yes
monitor_filters = send_on_enter
build_flags = -DLAB_5_1 -DSERIAL_FREERTOS_YIELD -Wl,-u,vfprintf -lprintf_flt -lm
lib_deps =
  feilipu/FreeRTOS
  marcoschwartz/LiquidCrystal_I2C
  markruys/DHT
build_src_filter =
  +<*>
  -<lab_1_1/> -<lab_1_2/>
  -<lab_2_1/> -<lab_2_2/>
  -<lab_3_1/> -<lab_3_2/>
  -<lab_4_1/> -<lab_4_2/>
  -<lab_5_2/>
  -<srv_os_sequential/>
  -<dd_keypad/> -<dd_sound/> -<dd_ldr/> -<dd_led_pwm/>
  -<ctrl_pid/>
  -<srv_lcd_keypad_stdio/>

; [env:mega_lab5_2]
; platform = atmelavr
; board = megaatmega2560
